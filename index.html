<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pool Pal</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f6faf9;
        --surface: #ffffff;
        --soft: #edf6f4;
        --line: #d7e4e1;
        --ink: #10201e;
        --muted: #62736f;
        --brand: #08756f;
        --brand-dark: #054f4b;
        --accent: #e96f53;
        --warn: #9a5b00;
        --good: #137a4a;
        --danger: #b42318;
        --shadow: 0 18px 44px rgba(16, 32, 30, 0.1);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: var(--page);
        color: var(--ink);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        overflow: hidden;
      }

      .sidebar {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 14px;
        padding: 16px;
        background: #ffffff;
        border-right: 1px solid var(--line);
        overflow: hidden;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 8px;
      }

      .brand p,
      .brand h1 {
        margin: 0;
      }

      .brand p,
      .label {
        color: var(--brand-dark);
        font-size: 0.72rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .muted {
        color: var(--muted);
      }

      h1 {
        font-size: 1.28rem;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 0.98rem;
      }

      .primary,
      .secondary,
      .conversation-button,
      .icon {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-weight: 820;
      }

      .primary {
        width: 100%;
        background: var(--brand);
        border-color: var(--brand);
        color: #ffffff;
      }

      .primary:hover {
        background: var(--brand-dark);
      }

      .secondary,
      .conversation-button,
      .icon {
        background: var(--surface);
        color: var(--ink);
      }

      .secondary:hover,
      .conversation-button:hover,
      .icon:hover {
        border-color: var(--brand);
        color: var(--brand-dark);
      }

      .conversation-list {
        display: grid;
        align-content: start;
        gap: 7px;
        overflow-y: auto;
      }

      .conversation-button {
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .conversation-button.active {
        background: var(--soft);
        border-color: var(--brand);
      }

      .side-section {
        display: grid;
        gap: 8px;
      }

      .side-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 750;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--warn);
      }

      .dot.ready {
        background: var(--good);
      }

      .dot.error {
        background: var(--danger);
      }

      .chat-shell {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }

      .mobile-top {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px clamp(16px, 4vw, 34px);
      }

      .chat-header strong {
        display: block;
        font-size: 1rem;
      }

      .chat-header span {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .messages {
        width: min(880px, 100%);
        min-height: 0;
        margin: 0 auto;
        padding: 8px clamp(14px, 4vw, 28px) 24px;
        display: grid;
        align-content: start;
        gap: 18px;
        overflow-y: auto;
      }

      .empty-state {
        min-height: 58vh;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 18px;
        text-align: center;
      }

      .empty-state img {
        width: 72px;
        height: 72px;
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .empty-state h2 {
        margin: 0;
        font-size: clamp(1.7rem, 6vw, 2.7rem);
      }

      .prompt-grid {
        width: min(720px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .prompt-card {
        min-height: 74px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px;
        text-align: left;
        color: var(--ink);
      }

      .prompt-card span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .message {
        display: grid;
        gap: 7px;
      }

      .message.user {
        justify-items: end;
      }

      .role {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 850;
      }

      .bubble {
        width: fit-content;
        max-width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 13px 14px;
        line-height: 1.5;
        box-shadow: 0 10px 26px rgba(16, 32, 30, 0.05);
      }

      .user .bubble {
        background: var(--soft);
        border-color: #c9dfdc;
      }

      .assistant .bubble {
        border-left: 4px solid var(--brand);
      }

      .bubble p {
        margin: 0 0 10px;
      }

      .bubble p:last-child,
      .bubble ul:last-child,
      .bubble ol:last-child {
        margin-bottom: 0;
      }

      .bubble ul,
      .bubble ol {
        margin: 8px 0 12px;
        padding-left: 20px;
      }

      .composer-wrap {
        padding: 12px clamp(12px, 4vw, 28px) max(16px, env(safe-area-inset-bottom));
        background: linear-gradient(180deg, rgba(246, 250, 249, 0), var(--page) 18%);
      }

      .composer {
        width: min(880px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: end;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .icon {
        width: 42px;
        display: grid;
        place-items: center;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        outline: none;
      }

      textarea {
        min-height: 46px;
        max-height: 160px;
        resize: vertical;
        border: 0;
        padding: 11px 4px;
      }

      input,
      select {
        min-height: 40px;
        padding: 9px 10px;
      }

      textarea:focus,
      input:focus,
      select:focus {
        box-shadow: 0 0 0 4px rgba(8, 117, 111, 0.12);
      }

      dialog {
        width: min(760px, calc(100vw - 24px));
        max-height: calc(100vh - 36px);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0;
        box-shadow: var(--shadow);
      }

      dialog::backdrop {
        background: rgba(16, 32, 30, 0.42);
      }

      .dialog-head,
      .dialog-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: var(--soft);
      }

      .dialog-foot {
        justify-content: flex-end;
        border-top: 1px solid var(--line);
        border-bottom: 0;
      }

      .dialog-body {
        padding: 14px;
        display: grid;
        gap: 14px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .full {
        grid-column: 1 / -1;
      }

      .drawer-open {
        overflow: hidden;
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          inset: 0 auto 0 0;
          z-index: 50;
          width: min(320px, calc(100vw - 42px));
          transform: translateX(-105%);
          transition: transform 180ms ease;
          box-shadow: var(--shadow);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .mobile-top {
          display: flex;
        }

        .chat-header {
          display: none;
        }

        .prompt-grid,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .empty-state {
          min-height: 52vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="Pool Pal sidebar">
        <div class="brand">
          <img src="pool-dose-icon.png" alt="Pool Pal">
          <div>
            <p>AI field assistant</p>
            <h1>Pool Pal</h1>
          </div>
        </div>

        <button class="primary" id="newChatButton" type="button">New chat</button>

        <section class="side-section">
          <div class="label">Past conversations</div>
          <div class="conversation-list" id="conversationList"></div>
        </section>

        <section class="side-section">
          <button class="secondary" id="settingsButton" type="button">Settings</button>
          <div class="side-card">
            <div class="status"><span class="dot" id="apiDot"></span><span id="apiStatus">Checking API</span></div>
          </div>
        </section>
      </aside>

      <section class="chat-shell">
        <div class="mobile-top">
          <button class="icon" id="openSidebarButton" type="button" aria-label="Open sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <strong>Pool Pal</strong>
          <button class="icon" id="mobileNewChatButton" type="button" aria-label="New chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <header class="chat-header">
          <div>
            <strong id="chatTitle">New pool service chat</strong>
            <span>Ask naturally. Pool Pal uses your company settings and OpenAI guidance.</span>
          </div>
          <button class="secondary" id="desktopNewChatButton" type="button">New chat</button>
        </header>

        <main class="messages" id="messages" aria-live="polite"></main>

        <div class="composer-wrap">
          <form class="composer" id="composer">
            <button class="icon" id="voiceButton" type="button" title="Speak question" aria-label="Speak question">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V6a3 3 0 0 0-3-3Z" stroke="currentColor" stroke-width="2"/>
                <path d="M19 11a7 7 0 0 1-14 0M12 18v3M8 21h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <textarea id="messageInput" placeholder="Ask Pool Pal about readings, diagnosis, chemicals, procedures, or stock"></textarea>
            <button class="primary" id="sendButton" type="submit">Send</button>
          </form>
        </div>
      </section>
    </div>

    <dialog id="settingsDialog">
      <div class="dialog-head">
        <div>
          <div class="label">Settings</div>
          <h2>Company and AI configuration</h2>
        </div>
        <button class="icon" id="closeSettingsButton" type="button" aria-label="Close settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="dialog-body">
        <div class="form-grid">
          <label>Model
            <select id="modelSelect">
              <option value="gpt-5.4-mini">gpt-5.4-mini</option>
              <option value="gpt-5.5">gpt-5.5</option>
              <option value="gpt-5.4">gpt-5.4</option>
            </select>
          </label>
          <label>Response style
            <select id="responseStyle">
              <option>Short field answer</option>
              <option>Step-by-step</option>
              <option>Troubleshooting-first</option>
              <option>Training-focused</option>
            </select>
          </label>
          <label>Target pH <input id="targetPh" inputmode="decimal"></label>
          <label>Target chlorine ppm <input id="targetChlorine" inputmode="decimal"></label>
          <label>Target alkalinity ppm <input id="targetAlkalinity" inputmode="decimal"></label>
          <label>Max acid dose ml <input id="maxAcid" inputmode="decimal"></label>
          <label class="full">Company procedures
            <textarea id="companyProcedures" rows="5"></textarea>
          </label>
          <label class="full">Vehicle stock / products
            <textarea id="vehicleStock" rows="3"></textarea>
          </label>
          <label class="full">Extra company knowledge
            <textarea id="companyKnowledge" rows="4"></textarea>
          </label>
        </div>
      </div>
      <div class="dialog-foot">
        <button class="secondary" id="resetSettingsButton" type="button">Reset</button>
        <button class="primary" id="saveSettingsButton" type="button">Save settings</button>
      </div>
    </dialog>

    <script>
      const STORE_KEY = "pool-pal:chat-ai";

      const DEFAULT_SETTINGS = {
        model: "gpt-5.4-mini",
        responseStyle: "Short field answer",
        targetPh: "7.4",
        targetChlorine: "3",
        targetAlkalinity: "120",
        maxAcid: "2000",
        companyProcedures: "Green pool: check circulation first, clean baskets/filter, balance pH, brush, dose chlorine in stages, run pump continuously, return or escalate if still green. Low flow or priming: check water level, skimmer/pump baskets, valves, lid O-ring, suction leaks, filter pressure, and do not run pump dry.",
        vehicleStock: "Liquid chlorine, acid, bicarb, salt, stabiliser. Track recommended versus actual additions when a technician reports usage.",
        companyKnowledge: "Use Australian pool service terminology. Be practical, field-friendly, and clear about uncertainty."
      };

      let state = loadState();

      const els = {
        sidebar: document.querySelector("#sidebar"),
        messages: document.querySelector("#messages"),
        composer: document.querySelector("#composer"),
        messageInput: document.querySelector("#messageInput"),
        sendButton: document.querySelector("#sendButton"),
        conversationList: document.querySelector("#conversationList"),
        chatTitle: document.querySelector("#chatTitle"),
        apiDot: document.querySelector("#apiDot"),
        apiStatus: document.querySelector("#apiStatus"),
        settingsDialog: document.querySelector("#settingsDialog")
      };

      function loadState() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORE_KEY));
          return {
            settings: { ...DEFAULT_SETTINGS, ...(stored?.settings || {}) },
            conversations: stored?.conversations?.length ? stored.conversations : [createConversation()],
            activeId: stored?.activeId || null
          };
        } catch {
          return {
            settings: { ...DEFAULT_SETTINGS },
            conversations: [createConversation()],
            activeId: null
          };
        }
      }

      function saveState() {
        localStorage.setItem(STORE_KEY, JSON.stringify(state));
      }

      function createId() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return `chat-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createConversation() {
        return {
          id: createId(),
          title: "New pool service chat",
          createdAt: new Date().toISOString(),
          messages: []
        };
      }

      function activeConversation() {
        if (!state.activeId || !state.conversations.some((chat) => chat.id === state.activeId)) {
          state.activeId = state.conversations[0].id;
        }
        return state.conversations.find((chat) => chat.id === state.activeId);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanAssistantText(text) {
        return String(text)
          .replace(/^#{1,6}\s+/gm, "")
          .replace(/\*\*(.*?)\*\*/g, "$1")
          .replace(/__(.*?)__/g, "$1")
          .replace(/^\s*[-*]\s+/gm, "- ")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function renderMessageText(text) {
        const escaped = escapeHtml(cleanAssistantText(text));
        const blocks = escaped.split(/\n{2,}/).map((block) => block.trim()).filter(Boolean);
        return blocks.map((block) => {
          const lines = block.split("\n").filter(Boolean);
          if (lines.every((line) => /^-\s+/.test(line))) {
            return `<ul>${lines.map((line) => `<li>${line.replace(/^-\s+/, "")}</li>`).join("")}</ul>`;
          }
          if (lines.every((line) => /^\d+\.\s+/.test(line))) {
            return `<ol>${lines.map((line) => `<li>${line.replace(/^\d+\.\s+/, "")}</li>`).join("")}</ol>`;
          }
          return `<p>${lines.join("<br>")}</p>`;
        }).join("");
      }

      function renderConversations() {
        els.conversationList.innerHTML = state.conversations.map((chat) => `
          <button class="conversation-button ${chat.id === state.activeId ? "active" : ""}" type="button" data-chat-id="${chat.id}">
            ${escapeHtml(chat.title)}
          </button>
        `).join("");

        document.querySelectorAll("[data-chat-id]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeId = button.dataset.chatId;
            saveState();
            renderAll();
            closeSidebar();
          });
        });
      }

      function renderMessages() {
        const chat = activeConversation();
        els.chatTitle.textContent = chat.title;

        if (!chat.messages.length) {
          els.messages.innerHTML = `
            <section class="empty-state">
              <img src="pool-dose-icon.png" alt="">
              <div>
                <h2>Ask Pool Pal anything</h2>
                <p class="muted">Real AI guidance for pool technicians, using your company settings.</p>
              </div>
              <div class="prompt-grid">
                <button class="prompt-card" type="button" data-prompt="The pool is green, chlorine is zero, the chlorinator says low flow and I can't get the pump to prime.">Diagnose a field problem<span>Green pool, low flow, pump prime</span></button>
                <button class="prompt-card" type="button" data-prompt="The pool is 7 metres by 3 metres and 1.5 metres deep. pH is 7.8, chlorine is 0.5 and alkalinity is 94. What should I add?">Calculate chemical guidance<span>Readings, volume, warnings</span></button>
                <button class="prompt-card" type="button" data-prompt="I added 1 litre of acid and 2 kilos of bicarb. Record that and tell me what it means for stock.">Track usage<span>Chemical additions and stock</span></button>
                <button class="prompt-card" type="button" data-prompt="Why does high alkalinity make pH difficult to control?">Train a technician<span>Simple field explanation</span></button>
              </div>
            </section>
          `;
          bindPromptCards();
          return;
        }

        els.messages.innerHTML = chat.messages.map((message) => `
          <article class="message ${message.role}">
            <div class="role">${message.role === "user" ? "Technician" : "Pool Pal"}</div>
            <div class="bubble">${renderMessageText(message.content)}</div>
          </article>
        `).join("");
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      function renderAll() {
        renderConversations();
        renderMessages();
      }

      function bindPromptCards() {
        document.querySelectorAll("[data-prompt]").forEach((button) => {
          button.addEventListener("click", () => sendMessage(button.dataset.prompt));
        });
      }

      function newChat() {
        const chat = createConversation();
        state.conversations.unshift(chat);
        state.activeId = chat.id;
        saveState();
        renderAll();
        closeSidebar();
        els.messageInput.focus();
      }

      function updateTitle(chat, content) {
        if (chat.title !== "New pool service chat") return;
        chat.title = content.replace(/\s+/g, " ").slice(0, 42) || "Pool service chat";
      }

      function buildContext() {
        return {
          responseStyle: state.settings.responseStyle,
          targets: {
            pH: state.settings.targetPh,
            chlorine: state.settings.targetChlorine,
            alkalinity: state.settings.targetAlkalinity,
            maxAcidMl: state.settings.maxAcid
          },
          companyProcedures: state.settings.companyProcedures,
          vehicleStock: state.settings.vehicleStock,
          companyKnowledge: state.settings.companyKnowledge
        };
      }

      async function sendMessage(content) {
        const clean = content.trim();
        if (!clean) return;

        const chat = activeConversation();
        chat.messages.push({ role: "user", content: clean });
        updateTitle(chat, clean);
        saveState();
        renderAll();
        els.messageInput.value = "";
        setBusy(true);

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: state.settings.model,
              context: buildContext(),
              messages: chat.messages.slice(-18)
            })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Pool Pal could not reach the AI service.");
          }

          chat.messages.push({ role: "assistant", content: data.message });
        } catch (error) {
          chat.messages.push({
            role: "assistant",
            content: `I could not reach the OpenAI API yet. ${error.message}\n\nCheck that the local server is running with OPENAI_API_KEY set.`
          });
        } finally {
          setBusy(false);
          saveState();
          renderAll();
        }
      }

      function setBusy(isBusy) {
        els.sendButton.disabled = isBusy;
        els.messageInput.disabled = isBusy;
        els.sendButton.textContent = isBusy ? "Thinking" : "Send";
      }

      async function checkApiStatus() {
        try {
          const response = await fetch("/api/status");
          const data = await response.json();
          els.apiDot.className = `dot ${data.ready ? "ready" : "error"}`;
          els.apiStatus.textContent = data.ready ? `OpenAI ready: ${data.model}` : "API key missing";
        } catch {
          els.apiDot.className = "dot error";
          els.apiStatus.textContent = "Server not running";
        }
      }

      function openSettings() {
        document.querySelector("#modelSelect").value = state.settings.model;
        document.querySelector("#responseStyle").value = state.settings.responseStyle;
        document.querySelector("#targetPh").value = state.settings.targetPh;
        document.querySelector("#targetChlorine").value = state.settings.targetChlorine;
        document.querySelector("#targetAlkalinity").value = state.settings.targetAlkalinity;
        document.querySelector("#maxAcid").value = state.settings.maxAcid;
        document.querySelector("#companyProcedures").value = state.settings.companyProcedures;
        document.querySelector("#vehicleStock").value = state.settings.vehicleStock;
        document.querySelector("#companyKnowledge").value = state.settings.companyKnowledge;
        els.settingsDialog.showModal();
      }

      function saveSettings() {
        state.settings = {
          model: document.querySelector("#modelSelect").value,
          responseStyle: document.querySelector("#responseStyle").value,
          targetPh: document.querySelector("#targetPh").value,
          targetChlorine: document.querySelector("#targetChlorine").value,
          targetAlkalinity: document.querySelector("#targetAlkalinity").value,
          maxAcid: document.querySelector("#maxAcid").value,
          companyProcedures: document.querySelector("#companyProcedures").value,
          vehicleStock: document.querySelector("#vehicleStock").value,
          companyKnowledge: document.querySelector("#companyKnowledge").value
        };
        saveState();
        els.settingsDialog.close();
      }

      function openSidebar() {
        els.sidebar.classList.add("open");
        document.body.classList.add("drawer-open");
      }

      function closeSidebar() {
        els.sidebar.classList.remove("open");
        document.body.classList.remove("drawer-open");
      }

      function setupVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const button = document.querySelector("#voiceButton");
        if (!SpeechRecognition) {
          button.disabled = true;
          button.title = "Speech input is not available in this browser";
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = "en-AU";
        recognition.interimResults = false;
        recognition.addEventListener("result", (event) => {
          els.messageInput.value = Array.from(event.results).map((result) => result[0].transcript).join(" ");
          els.messageInput.focus();
        });
        button.addEventListener("click", () => recognition.start());
      }

      els.composer.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(els.messageInput.value);
      });

      document.querySelector("#newChatButton").addEventListener("click", newChat);
      document.querySelector("#desktopNewChatButton").addEventListener("click", newChat);
      document.querySelector("#mobileNewChatButton").addEventListener("click", newChat);
      document.querySelector("#settingsButton").addEventListener("click", openSettings);
      document.querySelector("#closeSettingsButton").addEventListener("click", () => els.settingsDialog.close());
      document.querySelector("#saveSettingsButton").addEventListener("click", saveSettings);
      document.querySelector("#resetSettingsButton").addEventListener("click", () => {
        state.settings = { ...DEFAULT_SETTINGS };
        saveState();
        openSettings();
      });
      document.querySelector("#openSidebarButton").addEventListener("click", openSidebar);

      setupVoice();
      renderAll();
      checkApiStatus();
    </script>
  </body>
</html>
